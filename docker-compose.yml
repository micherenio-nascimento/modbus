services:

  collector:
    build:
      context: ./collector
    container_name: dse855-collector
    environment:
      DSE_BASE_URL: ${DSE_BASE_URL}
      DSE_USER: ${DSE_USER}
      DSE_PASSWORD: ${DSE_PASSWORD}
      CONTROL_TOKEN: ${CONTROL_TOKEN:-}
      COLLECT_INTERVAL_SECONDS: ${COLLECT_INTERVAL_SECONDS}
      MYSQL_SAVE_INTERVAL_SECONDS: ${MYSQL_SAVE_INTERVAL_SECONDS}
      SESSION_REFRESH_SECONDS: ${SESSION_REFRESH_SECONDS}
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "9108:9108"
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: dse855-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: dse855-backend
    environment:
      PORT: 4000
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-troque-este-segredo-em-producao}
      AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL:-logeng@gmail.com}
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  waha:
    image: devlikeapro/waha:latest
    platform: linux/amd64
    container_name: waha
    restart: unless-stopped
    
    environment:
      WHATSAPP_HOOK_URL: http://n8n:5678/webhook-test/webhook
      WHATSAPP_HOOK_EVENTS: message
      WHATSAPP_DEFAULT_ENGINE: NOWEB

      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: admin123

      WAHA_API_KEY: ""
      WAHA_NO_API_KEY: "True"

    volumes:
      - waha_sessions:/app/.sessions
      - waha_media:/app/.media

    ports:
      - "3000:3000"

  n8n:
    image: n8nio/n8n:latest
    platform: linux/amd64
    environment:
      WEBHOOK_URL: http://n8n:5678
      N8N_HOST: n8n
      GENERIC_TIMEZONE: America/Sao_Paulo
      N8N_LOG_LEVEL: debug
      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: true
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"

  frontend:
    build:
      context: ./frontend
    container_name: dse855-frontend
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
      grafana:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: dse855-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: dse855-grafana
    environment:
        # GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
        # GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 5s
      GF_USERS_DEFAULT_THEME: dark
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      GF_EXPLORE_ENABLED: "true"
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_VIEWERS_CAN_EDIT: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_COOKIE_SAMESITE: "none"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - mysql
    restart: unless-stopped

  # nginx:
  #   image: nginx:alpine
  #   container_name: auth-nginx
  #   ports:
  #     - "2021:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./.htpasswd:/etc/nginx/.htpasswd:ro
  #   depends_on:
  #     - frontend
  #   restart: unless-stopped

  app:
    image: nginx:alpine
    container_name: minha-app
    volumes:
      - ./html:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  mysql_data:
  waha_sessions:
  waha_media:
  prometheus_data:
  grafana_data:
  n8n_data:
