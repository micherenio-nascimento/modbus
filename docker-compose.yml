services:
  collector:
    build:
      context: ./collector
    container_name: dse855-collector
    environment:
      DSE_BASE_URL: ${DSE_BASE_URL}
      DSE_USER: ${DSE_USER}
      DSE_PASSWORD: ${DSE_PASSWORD}
      COLLECT_INTERVAL_SECONDS: ${COLLECT_INTERVAL_SECONDS}
      MYSQL_SAVE_INTERVAL_SECONDS: ${MYSQL_SAVE_INTERVAL_SECONDS}
      SESSION_REFRESH_SECONDS: ${SESSION_REFRESH_SECONDS}
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "9108:9108"
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: dse855-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: dse855-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: dse855-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 1s
      GF_USERS_DEFAULT_THEME: dark
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - mysql
    restart: unless-stopped

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
